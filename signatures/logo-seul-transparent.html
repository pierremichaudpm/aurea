<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      width: 100%; height: 100%;
      background: transparent;
    }
    body {
      width: 100%; height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
      <div style="padding:28px 32px; display:inline-flex; align-items:center;">
        <svg width="132" height="87" viewBox="0 0 44 29" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="hpebg2" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
        <line x1="0" y1="0" x2="0" y2="3" stroke="#c8a44e" stroke-width="1"/>
      </pattern>
      <mask id="mpebg2">
        <circle cx="29" cy="14.5" r="13" fill="white"/>
      </mask>
      <clipPath id="cpebg2">
        <circle cx="15" cy="14.5" r="13"/>
      </clipPath>
    </defs>
    <circle cx="15" cy="14.5" r="13" stroke="#c8a44e" stroke-width="1.4"/>
    <circle cx="29" cy="14.5" r="13" stroke="#c8a44e" stroke-width="1.4"/>
    <g clip-path="url(#cpebg2)">
      <rect width="44" height="29" fill="url(#hpebg2)" mask="url(#mpebg2)"/>
    </g>
  </svg>
      </div></body>
</html>

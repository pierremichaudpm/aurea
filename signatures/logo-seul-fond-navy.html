<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      width: 100%; height: 100%;
      background: #1a2332;
    }
    body {
      width: 100%; height: 100%;
      background: #1a2332;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
      <div style="padding:28px 36px; background:#1a2332; display:inline-flex; align-items:center;">
        <svg width="132" height="87" viewBox="0 0 44 29" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="h4bl1u" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
        <line x1="0" y1="0" x2="0" y2="3" stroke="#c8a44e" stroke-width="1"/>
      </pattern>
      <mask id="m4bl1u">
        <circle cx="29" cy="14.5" r="13" fill="white"/>
      </mask>
      <clipPath id="c4bl1u">
        <circle cx="15" cy="14.5" r="13"/>
      </clipPath>
    </defs>
    <circle cx="15" cy="14.5" r="13" stroke="#c8a44e" stroke-width="1.4"/>
    <circle cx="29" cy="14.5" r="13" stroke="#c8a44e" stroke-width="1.4"/>
    <g clip-path="url(#c4bl1u)">
      <rect width="44" height="29" fill="url(#h4bl1u)" mask="url(#m4bl1u)"/>
    </g>
  </svg>
      </div></body>
</html>
